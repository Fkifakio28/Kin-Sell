<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kin-Sell - Redirection</title>
  <style>
    body { background: #120b2b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
    .container { padding: 2rem; max-width: 560px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(111,88,255,0.3); border-top-color: #6f58ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #c7bedf; font-size: 1rem; margin: 0 0 1rem; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 0.8rem; }
    a { display: inline-block; padding: 12px 20px; background: #6f58ff; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.95rem; }
    a.secondary { background: rgba(255,255,255,0.12); }
    a:active { background: #5a45e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p id="status">Redirection vers Kin-Sell...</p>
    <div class="actions">
      <a id="openApp" href="#">Ouvrir Kin-Sell</a>
      <a id="openIntent" class="secondary" href="#">Forcer ouverture Android</a>
    </div>
  </div>
  <script>
    (function() {
      var search = window.location.search || "";
      var customUrl = "com.kinsell.app://auth/callback" + search;
      var intentUrl = "intent://auth/callback" + search + "#Intent;scheme=com.kinsell.app;package=com.kinsell.app;end";
      var httpsAppLink = "https://kin-sell.com/auth/callback" + search;
      var statusEl = document.getElementById("status");
      var openApp = document.getElementById("openApp");
      var openIntent = document.getElementById("openIntent");

      openApp.href = customUrl;
      openIntent.href = intentUrl;

      function jump(url) {
        try {
          window.location.href = url;
        } catch (e) {
          // ignore
        }
      }

      // Sequence robuste: custom scheme -> intent -> applink https
      jump(customUrl);

      setTimeout(function() {
        jump(intentUrl);
      }, 800);

      setTimeout(function() {
        jump(httpsAppLink);
      }, 1700);

      setTimeout(function() {
        statusEl.textContent = "Si l'application ne s'ouvre pas automatiquement, appuyez sur un bouton.";
      }, 2600);
    })();
  </script>
</body>
</html>
