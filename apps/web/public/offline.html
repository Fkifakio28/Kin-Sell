<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hors ligne — Kin-Sell</title>
<style>
  :root { color-scheme: light dark; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0f172a; color: #f8fafc; }
  .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 420px; text-align: center; background: rgba(255,255,255,0.05); padding: 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); }
  h1 { font-size: 1.4rem; margin: 0 0 10px; }
  p { margin: 8px 0; font-size: 0.95rem; color: #cbd5e1; line-height: 1.5; }
  button { margin-top: 14px; background: #6f58ff; color: #fff; border: 0; border-radius: 10px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ef4444; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1><span class="dot"></span>Connexion indisponible</h1>
      <p>Kin-Sell n'a pas pu joindre nos serveurs. Vérifiez votre connexion Internet.</p>
      <p>Les pages déjà consultées restent accessibles en mode hors ligne.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </div>
</body>
</html>
