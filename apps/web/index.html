<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO de base ── -->
    <title>Kin-Sell — Le marché africain</title>
    <meta name="description" content="Achetez, vendez et découvrez des offres partout en Afrique. Produits, services, boutiques en ligne et profils publics avec recherche géolocalisée sur Kin-Sell." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kin-sell.com/" />
    <meta name="theme-color" content="#120B2B" />
    <meta name="color-scheme" content="dark only" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- ── Empêcher le zoom (comportement natif) ── -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Open Graph (partage sur réseaux sociaux) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kin-Sell" />
    <meta property="og:title" content="Kin-Sell — Le marché africain" />
    <meta property="og:description" content="Le marché digital pour l'Afrique. Produits, services, boutiques en ligne." />
    <meta property="og:image" content="/assets/kin-sell/pwa-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kin-Sell" />
    <meta name="twitter:description" content="Le marché digital pour l'Afrique." />

    <!-- ── Performance — préconnexion API ── -->
    <link rel="preconnect" href="https://api.kin-sell.com" crossorigin />
    <link rel="dns-prefetch" href="//api.kin-sell.com" />

    <!-- ── Cloudflare Turnstile ── -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
