<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO de base ── -->
    <title>Kin-Sell — Marketplace Afrique | Achetez et Vendez en ligne</title>
    <meta name="description" content="Kin-Sell, la marketplace africaine. Achetez, vendez et découvrez produits, services et boutiques en ligne partout en Afrique. Livraison, annonces So-Kin et recherche géolocalisée." />
    <meta name="keywords" content="marketplace afrique, acheter vendre en ligne, e-commerce afrique, boutique en ligne, Kin-Sell, services livraison, annonces, Congo, RDC, Kinshasa" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://kin-sell.com/" />
    <meta name="theme-color" content="#120B2B" />
    <meta name="color-scheme" content="dark only" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- ── Empêcher le zoom (comportement natif) ── -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── Open Graph (partage sur réseaux sociaux) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kin-Sell" />
    <meta property="og:title" content="Kin-Sell — Marketplace Afrique | Achetez et Vendez en ligne" />
    <meta property="og:description" content="La marketplace digitale pour l'Afrique. Produits, services, boutiques en ligne, livraison et annonces So-Kin." />
    <meta property="og:image" content="/assets/kin-sell/pwa-512.png" />
    <meta property="og:url" content="https://kin-sell.com/" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kin-Sell — Marketplace Afrique" />
    <meta name="twitter:description" content="La marketplace digitale pour l'Afrique. Achetez, vendez, découvrez." />

    <!-- ── JSON-LD Structured Data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kin-Sell",
      "alternateName": "Kin-Sell Marketplace",
      "url": "https://kin-sell.com",
      "description": "Marketplace africaine : achetez, vendez et découvrez produits, services et boutiques en ligne partout en Afrique.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://kin-sell.com/explorer?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Kin-Sell",
        "url": "https://kin-sell.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://kin-sell.com/assets/kin-sell/pwa-512.png"
        },
        "sameAs": []
      }
    }
    </script>

    <!-- ── Performance — préconnexion API ── -->
    <link rel="preconnect" href="https://api.kin-sell.com" crossorigin />
    <link rel="dns-prefetch" href="//api.kin-sell.com" />

    <!-- ── Cloudflare Turnstile — chargé dynamiquement par TurnstileWidget.tsx ── -->
    <link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="//challenges.cloudflare.com" />

    <!-- ── Google AdSense — chargé 100% lazy par GoogleAdSlot.tsx (aucun preconnect pour épargner connexions lentes) ── -->
  </head>

    <div id="root"></div>

        <p>Achetez, vendez et découvrez produits, services et boutiques en ligne partout en Afrique. Livraison, annonces So-Kin et recherche géolocalisée à Kinshasa et en RDC.</p>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
