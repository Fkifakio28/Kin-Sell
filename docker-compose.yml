version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: kinsell-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kinsell
    ports:
      - "5432:5432"
    volumes:
      - kinsell_data:/var/lib/postgresql/data

volumes:
  kinsell_data:
