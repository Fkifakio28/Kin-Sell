name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK platform 36
        run: |
          sdkmanager --list 2>/dev/null | grep "platforms;android-3" | head -10
          sdkmanager "platforms;android-36" "build-tools;36.0.0" || sdkmanager "platforms;android-36"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build -w apps/web

      - name: Sync Capacitor
        working-directory: apps/web
        run: npx cap sync android

      - name: Remove compressed assets (prevents AAPT duplicate resource error)
        run: find apps/web/android/app/src/main/assets/public \( -name "*.gz" -o -name "*.br" \) -delete

      - name: Make gradlew executable
        run: chmod +x apps/web/android/gradlew

      - name: Build debug APK
        working-directory: apps/web/android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /tmp/gradle-output.txt

      - name: Upload Gradle logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-logs
          path: /tmp/gradle-output.txt
          retention-days: 5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kin-sell-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
