# Kin-Sell production Nginx config
# Updated: 2026-04-19

map $http_cf_connecting_ip $ks_client_ip {
    default $remote_addr;
    "~.+" $http_cf_connecting_ip;
}

limit_req_zone $ks_client_ip zone=ks_api_general:10m rate=30r/s;
limit_req_zone $ks_client_ip zone=ks_api_uploads:10m rate=30r/s;
limit_req_zone $ks_client_ip zone=ks_api_auth:10m rate=5r/s;

server {
    server_name api.kin-sell.com;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kin-sell.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kin-sell.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    server_name kin-sell.com www.kin-sell.com;

    root /home/kinsell/Kin-Sell/apps/web/dist;
    index index.html;

    # SW + HTML: never cache (force update on deploy)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/auth/ {
        limit_req zone=ks_api_auth burst=10 nodelay;

        proxy_pass http://127.0.0.1:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/uploads/ {
        limit_req zone=ks_api_uploads burst=60 nodelay;

        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 15s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;

        proxy_force_ranges on;
        add_header Accept-Ranges "bytes" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept, Accept-Encoding, Range" always;
    }

    location /api/ {
        limit_req zone=ks_api_general burst=50 nodelay;

        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # New websocket route used by app (path=/ws)
    location /ws/ {
        proxy_pass http://127.0.0.1:4000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $ks_client_ip;
        proxy_set_header X-Forwarded-For $ks_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/wasm;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kin-sell.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kin-sell.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.kin-sell.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = kin-sell.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name kin-sell.com www.kin-sell.com;
    return 404; # managed by Certbot
}

server {
    if ($host = api.kin-sell.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name api.kin-sell.com;
    return 404; # managed by Certbot
}
