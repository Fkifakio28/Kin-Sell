# ── Nginx reverse proxy for Kin-Sell ──
# Place in: /etc/nginx/sites-available/kin-sell
# Enable with: ln -s /etc/nginx/sites-available/kin-sell /etc/nginx/sites-enabled/
# Reload with: sudo nginx -t && sudo systemctl reload nginx

upstream kinsell_api {
    least_conn;
    server 127.0.0.1:4000;
    # Scale: add more PM2 instances here if using port-per-instance
}

# Rate-limit zones (shared across workers)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_uploads:10m rate=3r/s;

server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Redirect HTTP → HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # ── API proxy ──
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass http://kinsell_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── Auth routes (stricter rate limit) ──
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;

        proxy_pass http://kinsell_api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload routes (stricter rate limit) ──
    location /api/uploads/ {
        limit_req zone=api_uploads burst=5 nodelay;
        client_max_body_size 50M;

        proxy_pass http://kinsell_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Socket.IO) ──
    location /socket.io/ {
        proxy_pass http://kinsell_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Static uploads ──
    location /uploads/ {
        alias /var/www/kin-sell/apps/api/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Frontend (Vite build) ──
    location / {
        root /var/www/kin-sell/apps/web/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
